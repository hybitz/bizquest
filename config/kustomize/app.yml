apiVersion: apps/v1
kind: Deployment
metadata:
  name: bizquest-app
  labels:
    app: bizquest-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bizquest-app
  template:
    metadata:
      labels:
        app: bizquest-app
    spec:
      restartPolicy: Always
      containers:
      - name: bizquest
        image: bizquest/app:latest
        env:
        - name: PORT
          value: '3000'
        command: ['bizquest']
